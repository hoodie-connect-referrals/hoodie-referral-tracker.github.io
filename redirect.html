<script>

const WORKSPACE = "hoodie-connect-referrals";
const ACCESS_TOKEN = "ut_CxRLJQNcrmcuxY2lcvbE4khfpcX5ESHtBkRu3tF1";

const params = new URLSearchParams(window.location.search);
const slug = params.get("to");
const entry = LINKS[slug];

async function go() {
  if (!entry) {
    document.getElementById("msg").textContent = "Referral link not found. Double-check the QR code.";
    return;
  }

  // IMPORTANT: we must wait for this request to actually go out before
  // navigating away. Firing it without awaiting lets the browser cancel
  // the request mid-flight the instant window.location changes, which
  // means scans silently never get counted. A short timeout guards
  // against the counter API being slow or unreachable -- the person
  // should never get stuck waiting more than ~2.5s.
  const logCall = fetch(`https://api.counterapi.dev/v2/${WORKSPACE}/${slug}/up`, {
    headers: { "Authorization": `Bearer ${ACCESS_TOKEN}` }
  }).catch(() => {});
  const timeout = new Promise(resolve => setTimeout(resolve, 2500));
  await Promise.race([logCall, timeout]);

  window.location.replace(entry.url);
}

go();
</script>
